<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2 Lietuvių kalbos kursas</title>
<style>
:root {
  --bg: #f5f6fa;
  --card: #ffffff;
  --primary: #2563eb;
  --primary-light: #dbeafe;
  --primary-dark: #1d4ed8;
  --success: #16a34a;
  --success-light: #dcfce7;
  --error: #dc2626;
  --error-light: #fee2e2;
  --warn: #d97706;
  --warn-light: #fef3c7;
  --text: #1e293b;
  --text-secondary: #64748b;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
.hidden { display:none !important; }

/* NAV */
nav { background:var(--card); border-bottom:1px solid var(--border); padding:0 24px; position:sticky; top:0; z-index:100; box-shadow:var(--shadow); }
nav .nav-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; gap:8px; height:60px; overflow-x:auto; }
nav .logo { font-weight:800; font-size:18px; color:var(--primary); margin-right:16px; white-space:nowrap; cursor:pointer; }
nav .logo span { color:var(--text); }
nav button { background:none; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:14px; color:var(--text-secondary); white-space:nowrap; transition:.15s; font-weight:500; }
nav button:hover { background:var(--primary-light); color:var(--primary); }
nav button.active { background:var(--primary); color:#fff; }

/* MAIN */
main { max-width:1000px; margin:0 auto; padding:24px 16px 80px; }
h1 { font-size:28px; margin-bottom:8px; }
h2 { font-size:22px; margin-bottom:12px; }
h3 { font-size:18px; margin-bottom:8px; }
.subtitle { color:var(--text-secondary); margin-bottom:24px; font-size:15px; }
.card { background:var(--card); border-radius:var(--radius); padding:24px; margin-bottom:16px; box-shadow:var(--shadow); border:1px solid var(--border); }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-blue { background:var(--primary-light); color:var(--primary); }
.badge-green { background:var(--success-light); color:var(--success); }
.badge-red { background:var(--error-light); color:var(--error); }
.badge-yellow { background:var(--warn-light); color:var(--warn); }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:.15s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-dark); }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { background:#15803d; }
.btn-outline { background:transparent; border:2px solid var(--border); color:var(--text); }
.btn-outline:hover { border-color:var(--primary); color:var(--primary); }
.btn-sm { padding:6px 14px; font-size:13px; }
.btn:disabled { opacity:.5; cursor:not-allowed; }

/* GRID */
.grid { display:grid; gap:16px; }
.grid-2 { grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); }
.grid-3 { grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); }

/* PROGRESS BAR */
.progress-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin:8px 0; }
.progress-bar .fill { height:100%; background:var(--primary); border-radius:4px; transition:width .4s; }
.progress-text { font-size:13px; color:var(--text-secondary); }

/* EXERCISE COMMON */
.exercise-container { }
.exercise-question { font-size:16px; margin-bottom:16px; line-height:1.7; }
.exercise-question .blank { display:inline-block; min-width:120px; border-bottom:2px solid var(--primary); padding:2px 8px; margin:0 4px; }
.exercise-hint { font-size:13px; color:var(--text-secondary); font-style:italic; margin-bottom:12px; }
.exercise-hint .ru { color:var(--primary); }
.options-grid { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
.option-btn { padding:10px 18px; border:2px solid var(--border); border-radius:8px; background:var(--card); cursor:pointer; font-size:15px; transition:.15s; }
.option-btn:hover { border-color:var(--primary); background:var(--primary-light); }
.option-btn.selected { border-color:var(--primary); background:var(--primary-light); color:var(--primary); font-weight:600; }
.option-btn.correct { border-color:var(--success); background:var(--success-light); color:var(--success); }
.option-btn.wrong { border-color:var(--error); background:var(--error-light); color:var(--error); }
.option-btn.disabled { pointer-events:none; }

/* INPUT EXERCISE */
.exercise-input { padding:10px 14px; border:2px solid var(--border); border-radius:8px; font-size:15px; width:200px; max-width:100%; transition:.15s; outline:none; }
.exercise-input:focus { border-color:var(--primary); }
.exercise-input.correct { border-color:var(--success); background:var(--success-light); }
.exercise-input.wrong { border-color:var(--error); background:var(--error-light); }

/* FEEDBACK */
.feedback { padding:12px 16px; border-radius:8px; margin:12px 0; font-size:14px; line-height:1.6; }
.feedback-correct { background:var(--success-light); color:#166534; border:1px solid #bbf7d0; }
.feedback-wrong { background:var(--error-light); color:#991b1b; border:1px solid #fecaca; }
.feedback-info { background:var(--primary-light); color:#1e40af; border:1px solid #bfdbfe; }

/* SELECT DROPDOWN */
.exercise-select { padding:8px 12px; border:2px solid var(--border); border-radius:8px; font-size:15px; background:var(--card); cursor:pointer; min-width:160px; outline:none; }
.exercise-select:focus { border-color:var(--primary); }

/* TEXT PASSAGE */
.text-passage { background:#fafbfc; border:1px solid var(--border); border-radius:8px; padding:20px; margin:16px 0; line-height:1.9; font-size:15px; }
.text-passage .line-num { color:var(--text-secondary); font-size:12px; margin-right:8px; user-select:none; }

/* THEORY */
.theory-block { background:linear-gradient(135deg, #eff6ff, #f0fdf4); border:1px solid #bfdbfe; border-radius:var(--radius); padding:20px; margin:16px 0; }
.theory-block h4 { color:var(--primary); margin-bottom:8px; }
.theory-block .ru-note { color:#6b21a8; font-style:italic; margin-top:8px; }

/* TABLE */
.grammar-table { width:100%; border-collapse:collapse; margin:12px 0; font-size:14px; }
.grammar-table th { background:var(--primary); color:#fff; padding:10px 12px; text-align:left; font-weight:600; }
.grammar-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
.grammar-table tr:nth-child(even) td { background:#f8fafc; }
.grammar-table tr:hover td { background:var(--primary-light); }
.grammar-table .example { color:var(--text-secondary); font-style:italic; }

/* TABS */
.tabs { display:flex; gap:4px; border-bottom:2px solid var(--border); margin-bottom:20px; overflow-x:auto; }
.tab { padding:10px 18px; border:none; background:none; cursor:pointer; font-size:14px; font-weight:500; color:var(--text-secondary); border-bottom:2px solid transparent; margin-bottom:-2px; transition:.15s; white-space:nowrap; }
.tab:hover { color:var(--primary); }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

/* STATS */
.stat-num { font-size:32px; font-weight:800; color:var(--primary); }
.stat-label { font-size:13px; color:var(--text-secondary); }

/* SCORE DISPLAY */
.score-display { text-align:center; padding:32px; }
.score-circle { width:120px; height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:32px; font-weight:800; }
.score-good { background:var(--success-light); color:var(--success); border:4px solid var(--success); }
.score-ok { background:var(--warn-light); color:var(--warn); border:4px solid var(--warn); }
.score-bad { background:var(--error-light); color:var(--error); border:4px solid var(--error); }

/* NAV DOTS */
.exercise-nav { display:flex; align-items:center; justify-content:space-between; margin:20px 0; padding:16px 0; border-top:1px solid var(--border); }
.exercise-dots { display:flex; gap:6px; flex-wrap:wrap; }
.exercise-dot { width:32px; height:32px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; cursor:pointer; transition:.15s; background:var(--card); }
.exercise-dot.current { border-color:var(--primary); background:var(--primary-light); color:var(--primary); }
.exercise-dot.done { border-color:var(--success); background:var(--success-light); color:var(--success); }
.exercise-dot.wrong-dot { border-color:var(--error); background:var(--error-light); color:var(--error); }

/* TIMER */
.timer { font-size:14px; color:var(--text-secondary); font-variant-numeric:tabular-nums; }
.timer.warn { color:var(--warn); font-weight:600; }

/* RESPONSIVE */
@media (max-width:600px) {
  main { padding:16px 10px 60px; }
  h1 { font-size:22px; }
  .card { padding:16px; }
  nav .nav-inner { gap:4px; }
  nav button { padding:6px 10px; font-size:13px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="logo" onclick="showPage('home')">LT<span>B2</span></div>
    <button onclick="showPage('home')" data-page="home">Pradžia</button>
    <button onclick="showPage('dalyviai')" data-page="dalyviai">Dalyviai</button>
    <button onclick="showPage('linksniai')" data-page="linksniai">Linksniai</button>
    <button onclick="showPage('veiksmazodziai')" data-page="veiksmazodziai">Veiksmažodžiai</button>
    <button onclick="showPage('kalbos-vartojimas')" data-page="kalbos-vartojimas">Kalbos vartojimas</button>
    <button onclick="showPage('jungtukai')" data-page="jungtukai">Jungtukai</button>
    <button onclick="showPage('zodziu-daryba')" data-page="zodziu-daryba">Žodžių daryba</button>
    <button onclick="showPage('skyryba')" data-page="skyryba">Skyryba</button>
    <button onclick="showPage('zinynas')" data-page="zinynas">Žinynas</button>
    <button onclick="showPage('skaitymas')" data-page="skaitymas">Skaitymas</button>
    <button onclick="showPage('rasymas')" data-page="rasymas">Rašymas</button>
    <button onclick="showPage('egzaminas')" data-page="egzaminas">Egzaminas</button>
  </div>
</nav>

<main id="app"></main>

<script>
// ═══════════════════════════════════════════════════════════════
// STORAGE & STATE
// ═══════════════════════════════════════════════════════════════
const STORE_KEY = 'ltb2_progress';
let state = loadState();

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORE_KEY));
    if (s && s.version === 2) return s;
  } catch(e) {}
  return { version:2, scores:{}, completed:{}, streakDays:[], lastVisit:null };
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function recordScore(module, score, total) {
  if (!state.scores[module]) state.scores[module] = [];
  state.scores[module].push({ score, total, date: new Date().toISOString() });
  const today = new Date().toISOString().slice(0,10);
  if (!state.streakDays.includes(today)) state.streakDays.push(today);
  state.lastVisit = today;
  saveState();
}
function getBestScore(module) {
  const s = state.scores[module];
  if (!s || !s.length) return null;
  return Math.max(...s.map(x => Math.round(x.score/x.total*100)));
}
function getStreak() {
  const days = state.streakDays.sort().reverse();
  if (!days.length) return 0;
  let streak = 1;
  for (let i = 1; i < days.length; i++) {
    const d1 = new Date(days[i-1]), d2 = new Date(days[i]);
    if ((d1 - d2) / 86400000 <= 1.5) streak++; else break;
  }
  return streak;
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
let currentPage = 'home';
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  const app = document.getElementById('app');
  const renderers = { home:renderHome, dalyviai:renderDalyviai, linksniai:renderLinksniai, veiksmazodziai:renderVeiksmazodziai, 'kalbos-vartojimas':renderKalbosVartojimas, jungtukai:renderJungtukai, 'zodziu-daryba':renderZodziuDaryba, skyryba:renderSkyryba, zinynas:renderZinynas, skaitymas:renderSkaitymas, rasymas:renderRasymas, egzaminas:renderEgzaminas };
  if (renderers[page]) { app.innerHTML = ''; renderers[page](app); }
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════════════════
// HOME PAGE
// ═══════════════════════════════════════════════════════════════
function renderHome(el) {
  const streak = getStreak();
  const modules = [
    { id:'dalyviai', name:'Dalyviai (причастия)', desc:'Самая сложная тема B2: все типы причастий', icon:'📝' },
    { id:'linksniai', name:'Linksniai (падежи)', desc:'7 падежей — таблицы склонений и упражнения', icon:'📊' },
    { id:'veiksmazodziai', name:'Veiksmažodžiai (глаголы)', desc:'Спряжения, времена, возвратные глаголы', icon:'🔄' },
    { id:'kalbos-vartojimas', name:'Kalbos vartojimas', desc:'Формат экзамена: выбор правильной формы слова', icon:'🎯' },
    { id:'jungtukai', name:'Jungtukai (союзы)', desc:'Союзы и сложные предложения — ключ к B2 письму', icon:'🔗' },
    { id:'zodziu-daryba', name:'Žodžių daryba (словообразование)', desc:'Приставки, суффиксы и производные слова', icon:'🧩' },
    { id:'skyryba', name:'Skyryba (пунктуация)', desc:'Правила пунктуации — запятые, тире, двоеточия', icon:'✏️' },
    { id:'zinynas', name:'Gramatikos žinynas (справочник)', desc:'Полный справочник: наклонения, пассив, прилагательные, управление', icon:'📚' },
    { id:'skaitymas', name:'Skaitymas (чтение)', desc:'Тексты и задания в формате экзамена', icon:'📖' },
    { id:'rasymas', name:'Rašymas (письмо)', desc:'Деловые письма, жалобы, заявления', icon:'✍️' },
    { id:'egzaminas', name:'Bandomasis egzaminas', desc:'Пробный экзамен — полный формат B2', icon:'🏆' }
  ];
  el.innerHTML = `
    <h1>Pasiruošimas B2 egzaminui</h1>
    <p class="subtitle">Подготовка к экзамену III категории — 8 недель интенсивной практики</p>
    <div class="grid grid-3" style="margin-bottom:24px">
      <div class="card" style="text-align:center">
        <div class="stat-num">${streak}</div>
        <div class="stat-label">dienų iš eilės / дней подряд</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="stat-num">${Object.keys(state.scores).length}</div>
        <div class="stat-label">modulių pradėta / модулей начато</div>
      </div>
      <div class="card" style="text-align:center">
        <div class="stat-num">${state.streakDays.length}</div>
        <div class="stat-label">treniruočių dienų / дней занятий</div>
      </div>
    </div>
    <h2>Moduliai / Модули</h2>
    <div class="grid grid-2">
      ${modules.map(m => {
        const best = getBestScore(m.id);
        return `<div class="card" style="cursor:pointer" onclick="showPage('${m.id}')">
          <div style="display:flex;gap:12px;align-items:flex-start">
            <div style="font-size:28px">${m.icon}</div>
            <div style="flex:1">
              <h3 style="margin-bottom:4px">${m.name}</h3>
              <p style="font-size:13px;color:var(--text-secondary)">${m.desc}</p>
              ${best !== null ? `<div class="progress-bar" style="margin-top:8px"><div class="fill" style="width:${best}%"></div></div>
              <div class="progress-text">Лучший результат: ${best}%</div>` : '<div style="margin-top:8px"><span class="badge badge-blue">Nepradėta / Не начато</span></div>'}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="card" style="margin-top:24px">
      <h3>Структура экзамена B2 (III kategorija)</h3>
      <table class="grammar-table">
        <tr><th>Dalis</th><th>Trukmė</th><th>Taškai</th></tr>
        <tr><td><strong>I. Skaitymas ir kalbos vartojimas</strong><br><span class="example">Чтение и использование языка</span></td><td>1 val. 30 min.</td><td>40 (20+20)</td></tr>
        <tr><td><strong>II. Rašymas</strong><br><span class="example">Письмо</span></td><td>1 val.</td><td>20</td></tr>
        <tr><td><strong>III. Klausymas</strong><br><span class="example">Аудирование</span></td><td>35 min.</td><td>20</td></tr>
        <tr><td><strong>IV. Kalbėjimas</strong><br><span class="example">Говорение (отдельно)</span></td><td>~15 min.</td><td>20</td></tr>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// EXERCISE ENGINE
// ═══════════════════════════════════════════════════════════════
function createExerciseRunner(el, exercises, moduleId, title, subtitle) {
  let current = 0;
  let answers = new Array(exercises.length).fill(null);
  let checked = new Array(exercises.length).fill(false);
  let score = 0;
  let finished = false;

  function render() {
    if (finished) { renderResults(); return; }
    const ex = exercises[current];
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <button class="btn btn-outline btn-sm" onclick="showPage('home')">← Atgal</button>
        <div><h2 style="margin:0">${title}</h2><div class="subtitle" style="margin:0">${subtitle}</div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="badge badge-blue">${current+1} / ${exercises.length}</span>
          ${ex.topic ? `<span class="badge badge-yellow">${ex.topic}</span>` : ''}
        </div>
        ${ex.theory ? `<div class="theory-block"><h4>${ex.theory.title}</h4><p>${ex.theory.text}</p>${ex.theory.ru ? `<p class="ru-note">🇷🇺 ${ex.theory.ru}</p>` : ''}</div>` : ''}
        <div class="exercise-question">${ex.question}</div>
        ${ex.hint ? `<div class="exercise-hint">💡 ${ex.hint}</div>` : ''}
        <div id="exercise-area"></div>
        <div id="feedback-area"></div>
      </div>
      <div class="exercise-nav">
        <button class="btn btn-outline btn-sm" ${current===0?'disabled':''} onclick="window._exNav(-1)">← Ankstesnis</button>
        <div class="exercise-dots">${exercises.map((_,i) => `<div class="exercise-dot ${i===current?'current':''} ${checked[i]?(answers[i]===true?'done':'wrong-dot'):''}" onclick="window._exNav(${i})">${i+1}</div>`).join('')}</div>
        ${current < exercises.length - 1 ?
          `<button class="btn btn-primary btn-sm" onclick="window._exNav(1)">Kitas →</button>` :
          `<button class="btn btn-success btn-sm" onclick="window._exFinish()">Baigti ✓</button>`}
      </div>`;
    renderExercise(ex, document.getElementById('exercise-area'), document.getElementById('feedback-area'));
  }

  function renderExercise(ex, area, fbArea) {
    if (ex.type === 'choice') {
      area.innerHTML = `<div class="options-grid">${ex.options.map((o,i) => {
        let cls = 'option-btn';
        if (checked[current]) {
          cls += ' disabled';
          if (i === ex.correct) cls += ' correct';
          else if (answers[current] !== true && i === ex._chosen) cls += ' wrong';
        } else if (ex._chosen === i) cls += ' selected';
        return `<button class="${cls}" onclick="window._exChoose(${i})">${o}</button>`;
      }).join('')}</div>`;
      if (!checked[current]) {
        area.innerHTML += `<button class="btn btn-primary" onclick="window._exCheck()" ${ex._chosen===undefined?'disabled':''} id="check-btn">Patikrinti / Проверить</button>`;
      }
      if (checked[current]) showFeedback(ex, fbArea);
    } else if (ex.type === 'input') {
      const val = ex._input || '';
      area.innerHTML = `<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <input class="exercise-input ${checked[current]?(answers[current]?'correct':'wrong'):''}" id="ex-input" value="${val}" placeholder="Įrašykite..." ${checked[current]?'disabled':''} onkeydown="if(event.key==='Enter')window._exCheck()">
        ${!checked[current] ? `<button class="btn btn-primary" onclick="window._exCheck()">Patikrinti</button>` : ''}
      </div>`;
      if (checked[current]) showFeedback(ex, fbArea);
    } else if (ex.type === 'multi-input') {
      if (!ex._inputs) ex._inputs = new Array(ex.blanks.length).fill('');
      area.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px">
        ${ex.blanks.map((b,i) => `<div style="display:flex;gap:10px;align-items:center">
          <span style="font-weight:600;min-width:40px">(${b.num})</span>
          <input class="exercise-input ${checked[current]?(b.answer.map(a=>a.toLowerCase()).includes(ex._inputs[i]?.toLowerCase())?'correct':'wrong'):''}" 
            value="${ex._inputs[i]||''}" placeholder="..." ${checked[current]?'disabled':''}
            oninput="window._exMultiInput(${i}, this.value)" onkeydown="if(event.key==='Enter')window._exCheck()">
          ${checked[current] && !b.answer.map(a=>a.toLowerCase()).includes(ex._inputs[i]?.toLowerCase()) ? `<span style="color:var(--success);font-weight:600">${b.answer[0]}</span>` : ''}
        </div>`).join('')}
        ${!checked[current] ? `<button class="btn btn-primary" onclick="window._exCheck()" style="align-self:flex-start;margin-top:8px">Patikrinti</button>` : ''}
      </div>`;
      if (checked[current]) showFeedback(ex, fbArea);
    } else if (ex.type === 'select') {
      if (!ex._selects) ex._selects = new Array(ex.gaps.length).fill('');
      area.innerHTML = ex.text.replace(/\{(\d+)\}/g, (_, idx) => {
        const g = ex.gaps[+idx];
        const val = ex._selects[+idx] || '';
        let cls = '';
        if (checked[current]) {
          cls = val === g.answer ? 'correct' : 'wrong';
        }
        return `<select class="exercise-select ${cls}" onchange="window._exSelect(${idx}, this.value)" ${checked[current]?'disabled':''}>
          <option value="">– pasirinkite –</option>
          ${g.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}
        </select>`;
      });
      if (!checked[current]) {
        area.innerHTML += `<div style="margin-top:16px"><button class="btn btn-primary" onclick="window._exCheck()">Patikrinti</button></div>`;
      }
      if (checked[current]) showFeedback(ex, fbArea);
    }
  }

  function showFeedback(ex, fbArea) {
    const isCorrect = answers[current] === true;
    let explanation = ex.explanation || '';
    let ruExplanation = ex.ruExplanation || '';
    fbArea.innerHTML = `<div class="feedback ${isCorrect?'feedback-correct':'feedback-wrong'}">
      ${isCorrect ? '✅ Teisingai! / Правильно!' : '❌ Neteisingai. / Неправильно.'}
      ${explanation ? `<br>${explanation}` : ''}
      ${ruExplanation ? `<br><em style="opacity:.85">🇷🇺 ${ruExplanation}</em>` : ''}
    </div>`;
  }

  function renderResults() {
    const pct = Math.round(score / exercises.length * 100);
    const cls = pct >= 70 ? 'score-good' : pct >= 50 ? 'score-ok' : 'score-bad';
    recordScore(moduleId, score, exercises.length);
    el.innerHTML = `
      <div class="card score-display">
        <div class="score-circle ${cls}">${pct}%</div>
        <h2>${pct >= 70 ? 'Puiku! / Отлично!' : pct >= 50 ? 'Gerai, bet reikia praktikos / Неплохо, но нужна практика' : 'Reikia daugiau praktikos / Нужно больше практики'}</h2>
        <p style="color:var(--text-secondary);margin:12px 0">Teisingai: ${score} iš ${exercises.length}</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px">
          <button class="btn btn-primary" onclick="showPage('${currentPage}')">Kartoti / Повторить</button>
          <button class="btn btn-outline" onclick="showPage('home')">Į pradžią / На главную</button>
        </div>
      </div>`;
  }

  window._exChoose = (i) => { if (checked[current]) return; exercises[current]._chosen = i; render(); };
  window._exMultiInput = (i, v) => { exercises[current]._inputs[i] = v; };
  window._exSelect = (i, v) => { exercises[current]._selects[i] = v; };
  window._exCheck = () => {
    if (checked[current]) return;
    const ex = exercises[current];
    checked[current] = true;
    if (ex.type === 'choice') {
      answers[current] = ex._chosen === ex.correct;
    } else if (ex.type === 'input') {
      const v = document.getElementById('ex-input')?.value?.trim() || '';
      ex._input = v;
      const ok = ex.answer.map(a => a.toLowerCase()).includes(v.toLowerCase());
      answers[current] = ok;
    } else if (ex.type === 'multi-input') {
      let allOk = true;
      ex.blanks.forEach((b, i) => {
        if (!b.answer.map(a=>a.toLowerCase()).includes((ex._inputs[i]||'').trim().toLowerCase())) allOk = false;
      });
      answers[current] = allOk;
    } else if (ex.type === 'select') {
      let allOk = true;
      ex.gaps.forEach((g, i) => {
        if (ex._selects[i] !== g.answer) allOk = false;
      });
      answers[current] = allOk;
    }
    if (answers[current]) score++;
    render();
  };
  window._exNav = (d) => {
    if (typeof d === 'number' && d >= 0 && d < exercises.length) { current = d; }
    else if (d === 1 && current < exercises.length-1) { current++; }
    else if (d === -1 && current > 0) { current--; }
    render();
  };
  window._exFinish = () => {
    exercises.forEach((ex, i) => { if (!checked[i]) { checked[i] = true; answers[i] = false; } });
    finished = true; render();
  };
  render();
}

        <tr><td><strong>Pusdalyvis</strong> ж.</td><td>dirb<strong>dama</strong></td><td>rašy<strong>dama</strong></td><td>mylė<strong>dama</strong></td><td>skaity<strong>dama</strong></td><td>ei<strong>dama</strong></td></tr>
        <tr><td><strong>Padalyvis</strong> м.</td><td>dirb<strong>ęs</strong>*</td><td>paraš<strong>ius</strong></td><td>pamylėj<strong>ęs</strong></td><td>perskaič<strong>ius</strong></td><td>nuėj<strong>ęs</strong></td></tr>
      </table>
      <div class="theory-block">
        <h4>Как запомнить?</h4>
        <p><strong>Veikiamasis</strong> (действительный) — КТО делает: dirbantis = работающий<br>
        <strong>Neveikiamasis</strong> (страдательный) — ЧТО делается: dirbamas = выполняемый<br>
        <strong>Pusdalyvis</strong> — одновременное действие: dirbdamas = работая (в то время как)<br>
        <strong>Padalyvis</strong> — предшествующее действие: padirbęs = поработав (и потом...)</p>
        <p class="ru-note">Мнемоника: -antis = "-ающий", -amas = "-аемый", -tas = "-анный", -damas = "-ая" (дееприч.), -ęs (padalyvis) = "-ав"</p>
      </div>
    </div>

    <div style="text-align:center;margin:24px 0">
      <button class="btn btn-primary" onclick="window._dlTab('drill1')">Pradėti pratimus / Начать упражнения →</button>
    </div>`;
}

        <p><em>Žmogus<strong>,</strong> skaitantis knygą<strong>,</strong> sėdėjo ant suolo.</em><br>

        <p>Причастный оборот <strong>перед</strong> определяемым словом — <strong>БЕЗ</strong> запятой:</p>

        <p class="ru-note">Формулы для письма: Norėčiau + инфинитив, Būčiau dėkingas + jei + tariamoji, Prašyčiau + инфинитив. Выучите их наизусть!</p>
      </div>

      <h4 style="margin-top:16px">Условные предложения (sąlyginiai sakiniai)</h4>
      <div class="theory-block">
        <p><strong>Реальное условие</strong> (будущее): <em>Jei <strong>turėsiu</strong> laiko, <strong>ateisiu</strong>.</em> — Если буду иметь время, приду. (Изъявительное!)<br>
        <strong>Нереальное условие</strong> (бы): <em>Jei <strong>turėčiau</strong> laiko, <strong>ateičiau</strong>.</em> — Если бы имел время, пришёл бы. (Сослагательное!)<br>
        <strong>Нереальное в прошлом</strong>: <em>Jei <strong>būčiau turėjęs</strong> laiko, <strong>būčiau atėjęs</strong>.</em> — Если бы имел время (тогда), пришёл бы.</p>
        <p class="ru-note">Нереальное в прошлом: būčiau + причастие прош. вр. (= был бы + сделавший). Это составная форма — аналог русского "если бы я тогда знал..."</p>

        <tr><td><strong>jūs</strong></td><td>dirb<strong>kite</strong></td><td>rašy<strong>kite</strong></td><td>ei<strong>kite</strong></td><td>skaity<strong>kite</strong></td></tr>
        <tr><td><strong>mes</strong></td><td>dirb<strong>kime</strong></td><td>rašy<strong>kime</strong></td><td>ei<strong>kime</strong></td><td>skaity<strong>kime</strong></td></tr>

        <strong>Mes:</strong> основа + <strong>-kime</strong>: dirb-kime (= давайте работать)</p>

        <p class="ru-note">Для B2 экзамена лучше использовать вежливые формы с tariamoji nuosaka, а не голое повелительное наклонение!</p>

    </div>

        <p>Образование: причастие в нужном времени (без вспомогательного глагола):</p>

}

function renderZnPasyvas(el) {

        <tr><td><strong>viduje / vidury</strong></td><td>внутри / посреди</td><td>K.</td><td>vidury <strong>miesto</strong> (посреди города)</td></tr>
        <tr><td><strong>vietoj</strong></td><td>вместо</td><td>K.</td><td>vietoj <strong>manęs</strong> (вместо меня)</td></tr>
        <tr><td><strong>anot</strong></td><td>по мнению, по словам</td><td>K.</td><td>anot <strong>mokslininko</strong> (по мнению учёного)</td></tr>

        <tr style="background:#f0fdf4"><td colspan="4"><strong>+ Galininkas (винительный)</strong></td></tr>
        <tr><td><strong>į</strong></td><td>в (направление)</td><td>G.</td><td>į <strong>miestą</strong> (в город)</td></tr>
        <tr><td><strong>per</strong></td><td>через, за (время)</td><td>G.</td><td>per <strong>savaitę</strong> (за неделю)</td></tr>
        <tr><td><strong>apie</strong></td><td>о, про, около</td><td>G.</td><td>apie <strong>darbą</strong> (о работе)</td></tr>
        <tr><td><strong>prieš</strong></td><td>перед, против, назад</td><td>G.</td><td>prieš <strong>metus</strong> (год назад)</td></tr>
        <tr><td><strong>už</strong></td><td>за (позади), чем (сравн.)</td><td>G.</td><td>už <strong>namo</strong> (за домом), vyresnis už <strong>mane</strong></td></tr>
        <tr><td><strong>pas</strong></td><td>у, к (человеку)</td><td>G.</td><td>pas <strong>draugą</strong> (у друга)</td></tr>
        <tr><td><strong>pro</strong></td><td>мимо</td><td>G.</td><td>pro <strong>langą</strong> (мимо окна)</td></tr>

        <tr style="background:#fef3c7"><td colspan="4"><strong>+ Įnagininkas (творительный)</strong></td></tr>
        <tr><td><strong>su</strong></td><td>с (совместность)</td><td>Įn.</td><td>su <strong>draugu</strong> (с другом)</td></tr>
        <tr><td><strong>po</strong> (под)</td><td>под</td><td>Įn.</td><td>po <strong>stalu</strong> (под столом)</td></tr>
        <tr><td><strong>ties</strong></td><td>у, напротив</td><td>Įn.</td><td>ties <strong>namu</strong> (напротив дома)</td></tr>
      </table>
      <div class="theory-block">
        <h4>Критические отличия от русского!</h4>
        <p><strong>apie</strong> (о, про) + <strong>Galininkas</strong> (в русском "о" + предложный!)<br>
        <strong>pas</strong> (у, к человеку) + <strong>Galininkas</strong> (в русском "к" + дательный!)<br>
        <strong>po</strong> = 2 значения: "после" + K., "под" + Įn. (омоним!)<br>
        <strong>tarp</strong> (между) + <strong>Kilmininkas</strong> (в русском "между" + творительный!)</p>
        <p class="ru-note">Запомните: большинство предлогов → Kilmininkas! Только į, per, apie, prieš, už, pas, pro → Galininkas. Su, po (под), ties → Įnagininkas.</p>
      </div>
    </div>`;
}

function renderZnIvardis(el) {
  el.innerHTML = `
    <div class="card">
      <h3>Asmeniniai įvardžiai / Личные местоимения</h3>
      <table class="grammar-table">
        <tr><th>Linksnis</th><th>aš (я)</th><th>tu (ты)</th><th>jis (он)</th><th>ji (она)</th><th>mes (мы)</th><th>jūs (вы)</th><th>jie (они м.)</th><th>jos (они ж.)</th></tr>
        <tr><td>V.</td><td>aš</td><td>tu</td><td>jis</td><td>ji</td><td>mes</td><td>jūs</td><td>jie</td><td>jos</td></tr>
        <tr><td>K.</td><td>manęs</td><td>tavęs</td><td>jo</td><td>jos</td><td>mūsų</td><td>jūsų</td><td>jų</td><td>jų</td></tr>
        <tr><td>N.</td><td>man</td><td>tau</td><td>jam</td><td>jai</td><td>mums</td><td>jums</td><td>jiems</td><td>joms</td></tr>
        <tr><td>G.</td><td>mane</td><td>tave</td><td>jį</td><td>ją</td><td>mus</td><td>jus</td><td>juos</td><td>jas</td></tr>
        <tr><td>Įn.</td><td>manimi</td><td>tavimi</td><td>juo</td><td>ja</td><td>mumis</td><td>jumis</td><td>jais</td><td>jomis</td></tr>
        <tr><td>Vt.</td><td>manyje</td><td>tavyje</td><td>jame</td><td>joje</td><td>mumyse</td><td>jumyse</td><td>juose</td><td>jose</td></tr>
      </table>
    </div>

    <div class="card">
      <h3>Savybiniai įvardžiai / Притяжательные местоимения</h3>
      <table class="grammar-table">
        <tr><th>Asmuo</th><th>Формы</th><th>Русский</th><th>Пример</th></tr>
        <tr><td><strong>aš</strong></td><td>mano</td><td>мой/моя/моё</td><td><em>mano namas</em> (мой дом)</td></tr>
        <tr><td><strong>tu</strong></td><td>tavo</td><td>твой</td><td><em>tavo knyga</em> (твоя книга)</td></tr>
        <tr><td><strong>jis</strong></td><td>jo</td><td>его</td><td><em>jo automobilis</em> (его машина)</td></tr>
        <tr><td><strong>ji</strong></td><td>jos</td><td>её</td><td><em>jos katė</em> (её кошка)</td></tr>
        <tr><td><strong>mes</strong></td><td>mūsų</td><td>наш</td><td><em>mūsų šalis</em> (наша страна)</td></tr>
        <tr><td><strong>jūs</strong></td><td>jūsų</td><td>ваш</td><td><em>jūsų nuomonė</em> (ваше мнение)</td></tr>
        <tr><td><strong>jie/jos</strong></td><td>jų</td><td>их</td><td><em>jų vaikai</em> (их дети)</td></tr>
        <tr><td><strong>savo</strong></td><td>savo</td><td>свой</td><td><em>Jis myli <strong>savo</strong> šeimą.</em> (Он любит <strong>свою</strong> семью.)</td></tr>
      </table>
      <div class="theory-block">
        <h4>Важно: "savo" vs "jo/jos"</h4>
        <p><em>Jis myli <strong>savo</strong> mamą.</em> — Он любит <strong>свою</strong> маму (= его собственную).<br>
        <em>Jis myli <strong>jo</strong> mamą.</em> — Он любит <strong>его</strong> маму (= чужую!).</p>
        <p class="ru-note">Точно как в русском: "свой" = принадлежит подлежащему, "его/её" = принадлежит другому лицу.</p>
      </div>
    </div>

    <div class="card">
      <h3>Santykiniai įvardžiai / Относительные местоимения</h3>
      <div class="theory-block">
        <h4>kuris/kuri = который/которая</h4>
        <p>Склоняется как прилагательное! Согласуется по роду и числу с определяемым словом, а падеж определяется функцией в придаточном предложении.</p>
        <p><em>Žmogus, <strong>kuris</strong> čia gyvena...</em> — Человек, <strong>который</strong> здесь живёт... (V. — подлежащее)<br>
        <em>Žmogus, <strong>kurį</strong> matau...</em> — Человек, <strong>которого</strong> вижу... (G. — дополнение)<br>
        <em>Žmogus, <strong>kuriam</strong> padėjau...</em> — Человек, <strong>которому</strong> помог... (N. — дополнение)<br>
        <em>Moteris, <strong>kurios</strong> laukiu...</em> — Женщина, <strong>которую</strong> жду... (K. — laukti + K.!)</p>
      </div>
      <table class="grammar-table">
        <tr><th>Linksnis</th><th>Vyr. vns.</th><th>Mot. vns.</th><th>Vyr. dgs.</th><th>Mot. dgs.</th></tr>

        <tr><td>K.</td><td>kurio</td><td>kurios</td><td>kurių</td><td>kurių</td></tr>
        <tr><td>N.</td><td>kuriam</td><td>kuriai</td><td>kuriems</td><td>kurioms</td></tr>
        <tr><td>G.</td><td>kurį</td><td>kurią</td><td>kuriuos</td><td>kurias</td></tr>
        <tr><td>Įn.</td><td>kuriuo</td><td>kuria</td><td>kuriais</td><td>kuriomis</td></tr>
        <tr><td>Vt.</td><td>kuriame</td><td>kurioje</td><td>kuriuose</td><td>kuriose</td></tr>
      </table>
    </div>`;
}
